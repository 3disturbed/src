<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DarkPixel - Pixel Art Studio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Top Menu Bar -->
        <header class="menubar">
            <div class="menubar-left">
                <span class="app-logo">DarkPixel</span>
                <div class="menu-group">
                    <button id="newProjectBtn" class="menu-btn" title="New Project (Ctrl+N)">
                        <svg viewBox="0 0 16 16" class="icon"><path d="M3 1.5h6.5L13 5v9.5H3z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M9.5 1.5V5H13" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M6 9h4M8 7v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                        <span>New</span>
                    </button>
                    <button id="openProjectBtn" class="menu-btn" title="Open Project (Ctrl+O)">
                        <svg viewBox="0 0 16 16" class="icon"><path d="M1.5 5.5h3L6 3.5h4.5V5.5h3L12 13.5H1.5z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
                        <span>Open</span>
                    </button>
                    <button id="saveProjectBtn" class="menu-btn" title="Save Project (Ctrl+S)">
                        <svg viewBox="0 0 16 16" class="icon"><path d="M2.5 1.5h9l2 2V13.5h-11z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><rect x="5" y="1.5" width="5" height="3.5" rx=".5" fill="none" stroke="currentColor" stroke-width="1"/><rect x="4.5" y="9" width="7" height="4.5" rx=".5" fill="none" stroke="currentColor" stroke-width="1"/></svg>
                        <span>Save</span>
                    </button>
                    <input type="file" id="loadProjectInput" style="display:none" accept=".pixelart,.json">
                </div>
                <div class="menu-separator"></div>
                <div class="menu-group">
                    <button id="gridToggleBtn" class="menu-btn toggle-btn active" title="Toggle Grid (G)">
                        <svg viewBox="0 0 16 16" class="icon"><rect x="1" y="1" width="14" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><line x1="5.5" y1="1" x2="5.5" y2="15" stroke="currentColor" stroke-width="1"/><line x1="10.5" y1="1" x2="10.5" y2="15" stroke="currentColor" stroke-width="1"/><line x1="1" y1="5.5" x2="15" y2="5.5" stroke="currentColor" stroke-width="1"/><line x1="1" y1="10.5" x2="15" y2="10.5" stroke="currentColor" stroke-width="1"/></svg>
                    </button>
                    <button id="mirrorToggleBtn" class="menu-btn toggle-btn" title="Mirror Mode (M)">
                        <svg viewBox="0 0 16 16" class="icon"><line x1="8" y1="1" x2="8" y2="15" stroke="currentColor" stroke-width="1.3" stroke-dasharray="2 1.5"/><path d="M5 5L2 8l3 3" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 5l3 3-3 3" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>
                <div class="menu-separator"></div>
                <div class="menu-group">
                    <button id="undoBtn" class="menu-btn" title="Undo (Ctrl+Z)">
                        <svg viewBox="0 0 16 16" class="icon"><path d="M3 8h7.5a3 3 0 110 6H9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6 5L3 8l3 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <button id="redoBtn" class="menu-btn" title="Redo (Ctrl+Y)">
                        <svg viewBox="0 0 16 16" class="icon"><path d="M13 8H5.5a3 3 0 100 6H7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 5l3 3-3 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>
            </div>
            <div class="menubar-center">
                <span class="canvas-dimensions" id="canvasDimLabel">32 x 32</span>
                <span class="zoom-display" id="zoomDisplay">16x</span>
            </div>
            <div class="menubar-right">
                <div class="menu-group">
                    <button id="exportPNGBtn" class="menu-btn" title="Export PNG">
                        <svg viewBox="0 0 16 16" class="icon"><path d="M2 12.5v2h12v-2" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M8 2v8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M5 7l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        <span>PNG</span>
                    </button>
                    <button id="exportGIFBtn" class="menu-btn" title="Export GIF">
                        <svg viewBox="0 0 16 16" class="icon"><path d="M2 12.5v2h12v-2" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M8 2v8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M5 7l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        <span>GIF</span>
                    </button>
                    <button id="exportJSONBtn" class="menu-btn" title="Export Data">
                        <svg viewBox="0 0 16 16" class="icon"><path d="M2 12.5v2h12v-2" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M8 2v8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M5 7l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        <span>JSON</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="workspace">
            <!-- Left Toolbar - Tools -->
            <aside class="toolbar" id="toolbar">
                <div class="tool-section">
                    <button class="tool-btn active" data-tool="pencil" title="Pencil (P)">
                        <svg viewBox="0 0 24 24" class="tool-icon"><path d="M4 20l1.5-5L17.5 3l3 3L8.5 18z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M15 5.5l3 3" stroke="currentColor" stroke-width="1.8"/><path d="M4 20l1.5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
                        <svg viewBox="0 0 24 24" class="tool-icon"><path d="M9 20h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M5.5 16.5L15 7l4 4-9.5 9.5H6l-2.5-2.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M15 7l4 4" stroke="currentColor" stroke-width="1.8"/><line x1="9.5" y1="12.5" x2="13.5" y2="16.5" stroke="currentColor" stroke-width="1" stroke-dasharray="1.5 1.5"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="fill" title="Fill Bucket (B)">
                        <svg viewBox="0 0 24 24" class="tool-icon"><path d="M7 17.5l-3-3 8.5-8.5 3 3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M12.5 6L15 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M19 13c0 0 2 2.5 2 4a2 2 0 01-4 0c0-1.5 2-4 2-4z" fill="currentColor" opacity="0.4" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)">
                        <svg viewBox="0 0 24 24" class="tool-icon"><path d="M19.5 4.5a2.5 2.5 0 00-3.5 0l-1 1-1-1L6 12.5l4 4 8-8-1-1 1-1a2.5 2.5 0 000-2z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M6 12.5L4 20.5l8-2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                    </button>
                </div>
                <div class="tool-divider"></div>
                <div class="tool-section">
                    <button class="tool-btn" data-tool="line" title="Line (L)">
                        <svg viewBox="0 0 24 24" class="tool-icon"><line x1="5" y1="19" x2="19" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="5" cy="19" r="1.5" fill="currentColor"/><circle cx="19" cy="5" r="1.5" fill="currentColor"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
                        <svg viewBox="0 0 24 24" class="tool-icon"><rect x="4" y="6" width="16" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 2"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="circle" title="Circle (C)">
                        <svg viewBox="0 0 24 24" class="tool-icon"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 2"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="rectFilled" title="Filled Rectangle (Shift+R)">
                        <svg viewBox="0 0 24 24" class="tool-icon"><rect x="4" y="6" width="16" height="12" rx="1" fill="currentColor" opacity="0.35" stroke="currentColor" stroke-width="2"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="circleFilled" title="Filled Circle (Shift+C)">
                        <svg viewBox="0 0 24 24" class="tool-icon"><circle cx="12" cy="12" r="8" fill="currentColor" opacity="0.35" stroke="currentColor" stroke-width="2"/></svg>
                    </button>
                </div>
                <div class="tool-divider"></div>
                <div class="tool-section">
                    <button class="tool-btn" data-tool="lasso" title="Lasso Select (S)">
                        <svg viewBox="0 0 24 24" class="tool-icon"><ellipse cx="12" cy="10" rx="8" ry="6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-dasharray="3 2"/><path d="M12 16c0 2-2 4-4 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="8" cy="21" r="1.5" fill="currentColor"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="lassoFill" title="Lasso Fill (Shift+S)">
                        <svg viewBox="0 0 24 24" class="tool-icon"><ellipse cx="12" cy="10" rx="8" ry="6" fill="currentColor" opacity="0.25" stroke="currentColor" stroke-width="1.8"/><path d="M12 16c0 2-2 4-4 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="8" cy="21" r="1.5" fill="currentColor"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="move" title="Move (V)">
                        <svg viewBox="0 0 24 24" class="tool-icon"><path d="M12 4v16M4 12h16" stroke="currentColor" stroke-width="1.8"/><path d="M12 4l-2.5 3h5zM12 20l-2.5-3h5zM4 12l3-2.5v5zM20 12l-3-2.5v5z" fill="currentColor"/></svg>
                    </button>
                </div>
                <div class="tool-divider"></div>
                <!-- Color Swatches -->
                <div class="color-area">
                    <div class="fg-bg-swatches">
                        <div class="fg-swatch" id="fgSwatch" title="Foreground Color (click to change)"></div>
                        <div class="bg-swatch" id="bgSwatch" title="Background Color (click to change)"></div>
                        <button class="swap-btn" id="swapColorsBtn" title="Swap FG/BG (X)">
                            <svg viewBox="0 0 12 12" class="icon-tiny"><path d="M1 4h8M7 2l2 2-2 2M11 8H3M5 6l-2 2 2 2" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
                        </button>
                    </div>
                    <input type="color" id="colorPicker" value="#000000" class="hidden-picker">
                    <span class="color-hex" id="colorHex">#000000</span>
                </div>
                <div class="tool-divider"></div>
                <!-- Brush Size -->
                <div class="brush-area">
                    <label class="mini-label">Size</label>
                    <input type="range" id="brushSize" min="1" max="32" value="1" class="vertical-slider">
                    <span class="brush-val" id="brushSizeLabel">1</span>
                </div>
            </aside>

            <!-- Canvas Area -->
            <div class="canvas-area">
                <div class="canvas-scroll" id="canvasScroll">
                    <canvas id="pixelCanvas"></canvas>
                </div>
                <!-- Status Bar -->
                <div class="status-bar">
                    <span id="pixelInfo">0, 0</span>
                    <span id="toolInfo">Pencil</span>
                    <div class="zoom-controls">
                        <button class="zoom-btn" id="zoomOutBtn" title="Zoom Out (-)">-</button>
                        <input type="range" id="zoomSlider" min="1" max="32" value="16" class="zoom-slider">
                        <button class="zoom-btn" id="zoomInBtn" title="Zoom In (+)">+</button>
                    </div>
                </div>
            </div>

            <!-- Right Panel -->
            <aside class="right-panel" id="rightPanel">
                <!-- Palette Panel -->
                <div class="panel" id="palettePanel">
                    <div class="panel-header" data-panel="palette">
                        <span class="panel-title">Palette</span>
                        <span class="panel-toggle">&#9660;</span>
                    </div>
                    <div class="panel-body">
                        <div class="palette-grid" id="paletteGrid"></div>
                    </div>
                </div>

                <!-- Layers Panel -->
                <div class="panel" id="layersPanel">
                    <div class="panel-header" data-panel="layers">
                        <span class="panel-title">Layers</span>
                        <span class="panel-toggle">&#9660;</span>
                    </div>
                    <div class="panel-body">
                        <div class="panel-toolbar">
                            <button id="newLayerBtn" class="icon-btn" title="New Layer">
                                <svg viewBox="0 0 16 16" class="icon"><line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="2"/><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="2"/></svg>
                            </button>
                            <button id="duplicateLayerBtn" class="icon-btn" title="Duplicate Layer">
                                <svg viewBox="0 0 16 16" class="icon"><rect x="1" y="3" width="9" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="5" y="1" width="9" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                            </button>
                            <button id="mergeLayerBtn" class="icon-btn" title="Merge Down">
                                <svg viewBox="0 0 16 16" class="icon"><path d="M4 3h8M4 8h8M8 3v8M4 13l4-3 4 3" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                            </button>
                            <button id="deleteLayerBtn" class="icon-btn danger" title="Delete Layer">
                                <svg viewBox="0 0 16 16" class="icon"><path d="M3 4h10M5 4V3h6v1M6 6v6M10 6v6M4 4l1 10h6l1-10" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                            </button>
                        </div>
                        <div id="layersList" class="layers-list"></div>
                    </div>
                </div>

                <!-- Canvas Settings Panel -->
                <div class="panel" id="canvasPanel">
                    <div class="panel-header" data-panel="canvas">
                        <span class="panel-title">Canvas</span>
                        <span class="panel-toggle">&#9660;</span>
                    </div>
                    <div class="panel-body">
                        <div class="canvas-size-row">
                            <div class="size-input">
                                <label>W</label>
                                <input type="number" id="canvasWidth" value="32" min="8" max="512">
                            </div>
                            <svg viewBox="0 0 16 16" class="link-icon"><path d="M5 4v2a3 3 0 000 4v2M11 4v2a3 3 0 010 4v2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                            <div class="size-input">
                                <label>H</label>
                                <input type="number" id="canvasHeight" value="32" min="8" max="512">
                            </div>
                            <button id="resizeCanvasBtn" class="apply-btn" title="Apply Size">&#10003;</button>
                        </div>
                        <div class="preset-row">
                            <button class="preset-btn" data-size="16">16</button>
                            <button class="preset-btn" data-size="32">32</button>
                            <button class="preset-btn" data-size="64">64</button>
                            <button class="preset-btn" data-size="128">128</button>
                            <button class="preset-btn" data-size="256">256</button>
                        </div>
                    </div>
                </div>

                <!-- Frames & Animation Panel -->
                <div class="panel" id="framesPanel">
                    <div class="panel-header" data-panel="frames">
                        <span class="panel-title">Animation</span>
                        <span class="panel-toggle">&#9660;</span>
                    </div>
                    <div class="panel-body">
                        <div class="panel-toolbar">
                            <button id="newFrameBtn" class="icon-btn" title="New Frame">
                                <svg viewBox="0 0 16 16" class="icon"><line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="2"/><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="2"/></svg>
                            </button>
                            <button id="dupFrameBtn" class="icon-btn" title="Duplicate Frame">
                                <svg viewBox="0 0 16 16" class="icon"><rect x="1" y="3" width="9" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="5" y="1" width="9" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                            </button>
                            <button id="deleteFrameBtn" class="icon-btn danger" title="Delete Frame">
                                <svg viewBox="0 0 16 16" class="icon"><path d="M3 4h10M5 4V3h6v1M6 6v6M10 6v6M4 4l1 10h6l1-10" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
                            </button>
                            <div class="toolbar-spacer"></div>
                            <button id="playAnimationBtn" class="icon-btn play-btn" title="Play Animation (Space)">
                                <svg viewBox="0 0 16 16" class="icon"><polygon points="4,2 14,8 4,14" fill="currentColor"/></svg>
                            </button>
                            <button id="stopAnimationBtn" class="icon-btn" title="Stop Animation">
                                <svg viewBox="0 0 16 16" class="icon"><rect x="3" y="3" width="10" height="10" fill="currentColor"/></svg>
                            </button>
                        </div>
                        <div id="framesList" class="frames-list"></div>
                        <div class="fps-row">
                            <label>FPS</label>
                            <input type="range" id="fpsSlider" min="1" max="60" value="12" class="fps-slider">
                            <input type="number" id="fpsInput" value="12" min="1" max="60" class="fps-num">
                        </div>
                    </div>
                </div>

                <!-- Onion Skin Panel -->
                <div class="panel" id="onionPanel">
                    <div class="panel-header" data-panel="onion">
                        <span class="panel-title">Onion Skin</span>
                        <label class="panel-switch">
                            <input type="checkbox" id="onionSkinToggle">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="panel-body">
                        <div class="onion-row">
                            <label>Opacity</label>
                            <input type="range" id="onionSkinOpacity" min="0" max="100" value="50">
                            <span id="opacityLabel">50%</span>
                        </div>
                        <div class="onion-row">
                            <label>Back</label>
                            <input type="number" id="onionSkinBack" min="0" max="5" value="1" class="tiny-num">
                            <label>Fwd</label>
                            <input type="number" id="onionSkinForward" min="0" max="5" value="1" class="tiny-num">
                        </div>
                    </div>
                </div>

                <!-- Preview Mini -->
                <div class="panel" id="previewPanel">
                    <div class="panel-header" data-panel="preview">
                        <span class="panel-title">Preview</span>
                        <span class="panel-toggle">&#9660;</span>
                    </div>
                    <div class="panel-body preview-body">
                        <canvas id="previewCanvas" class="preview-canvas"></canvas>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Core modules -->
    <script src="core/event-bus.js"></script>
    <script src="core/color.js"></script>
    <script src="core/pixel-data.js"></script>
    <script src="core/command.js"></script>
    <script src="core/history.js"></script>

    <!-- Utilities -->
    <script src="utils.js"></script>
    <script src="config.js"></script>

    <!-- Input -->
    <script src="input/pointer-handler.js"></script>
    <script src="input/keyboard-handler.js"></script>
    <script src="input/gesture-handler.js"></script>

    <!-- Render -->
    <script src="render/compositor.js"></script>
    <script src="render/renderer.js"></script>

    <!-- Data -->
    <script src="layers.js"></script>
    <script src="frames.js"></script>

    <!-- App -->
    <script src="app.js"></script>
</body>
</html>
